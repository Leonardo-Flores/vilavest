services:
  # ─── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vilavest-db
    environment:
      POSTGRES_USER: vilavest
      POSTGRES_PASSWORD: vilavest_secret
      POSTGRES_DB: vilavest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vilavest"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Go Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vilavest-api
    ports:
      - "8080:8080"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: vilavest
      DB_PASSWORD: vilavest_secret
      DB_NAME: vilavest
      DB_SSLMODE: disable
      JWT_SECRET: dev-secret-change-in-production
      APP_ENV: development
      FRONTEND_URL: http://localhost:5173
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  # ─── React Frontend ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/Dockerfile.frontend
    container_name: vilavest-web
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
