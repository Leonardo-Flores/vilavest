name: Deploy Backend · prod

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-prod.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io (vilavest-api-prod)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://vilavest.leonardoflores.dev.br
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --config fly.prod.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
